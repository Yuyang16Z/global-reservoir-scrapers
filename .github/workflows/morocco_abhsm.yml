name: Morocco ABHSM scrape

on:
  schedule:
    # 07:30 UTC and 15:30 UTC
    - cron: "30 7,15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: morocco-abhsm
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          OUTPUT_DIR: ${{ github.workspace }}/data/morocco/abhsm
        run: python scrapers/morocco/abhsm/morocco_abhsm_scraper.py

      - name: Commit & push new data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/morocco/abhsm
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data(morocco/abhsm): scheduled scrape ${ts}"
          git pull --rebase origin main
          git push
