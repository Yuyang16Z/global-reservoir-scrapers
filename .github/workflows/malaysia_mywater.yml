name: Malaysia MyWater (JPS dams metadata) scrape

# Static metadata source — run on demand only.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: malaysia-mywater
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          OUTPUT_DIR: ${{ github.workspace }}/data/malaysia_mywater
        run: python scrapers/malaysia_mywater/mywater_jps_scraper.py

      - name: Commit & push new data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/malaysia_mywater
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data(malaysia/mywater): manual scrape ${ts}"
          git pull --rebase origin main
          git push
