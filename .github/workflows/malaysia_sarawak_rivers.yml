name: Malaysia Sarawak iHydro (rivers) scrape

# RIVER / RAINFALL gauges — NOT reservoir data. See scrapers/malaysia_sarawak_rivers/README.md
on:
  schedule:
    # 02:00 UTC  = 10:00 Malaysia (UTC+8)
    # 14:00 UTC  = 22:00 Malaysia
    - cron: "5 2,14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: malaysia-sarawak-rivers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          OUTPUT_DIR: ${{ github.workspace }}/data/malaysia/sarawak_rivers
        run: python scrapers/malaysia/sarawak_rivers/sarawak_ihydro_scraper.py

      - name: Commit & push new data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/malaysia/sarawak_rivers
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data(malaysia/sarawak-rivers): scheduled scrape ${ts}"
          git pull --rebase origin main
          git push
