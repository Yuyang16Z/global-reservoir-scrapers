name: Taiwan WRA scrape

# WRA has a historical daily endpoint. Run weekly and fetch a rolling 15-day
# window so the repo gets fewer bot commits while still tolerating one missed
# weekly run.
on:
  schedule:
    - cron: "45 1 * * 1"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backfill start (YYYY-MM-DD). Leave blank for default (yesterday+today)."
        required: false
      end_date:
        description: "Backfill end (YYYY-MM-DD)."
        required: false

permissions:
  contents: write

concurrency:
  group: taiwan-wra
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Compute scrape window
        id: scrape_window
        env:
          INPUT_START_DATE: ${{ github.event.inputs.start_date || '' }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date || '' }}
          TZ: Asia/Taipei
        run: |
          if [ -n "$INPUT_START_DATE" ] || [ -n "$INPUT_END_DATE" ]; then
            start="${INPUT_START_DATE:-$INPUT_END_DATE}"
            end="${INPUT_END_DATE:-$INPUT_START_DATE}"
          else
            start=$(date -d "14 days ago" +"%Y-%m-%d")
            end=$(date +"%Y-%m-%d")
          fi
          echo "start_date=${start}" >> "$GITHUB_OUTPUT"
          echo "end_date=${end}" >> "$GITHUB_OUTPUT"

      - name: Run scraper
        env:
          OUTPUT_DIR: ${{ github.workspace }}/data/taiwan/wra
          TAIWAN_START_DATE: ${{ steps.scrape_window.outputs.start_date }}
          TAIWAN_END_DATE: ${{ steps.scrape_window.outputs.end_date }}
          SKIP_EXISTING_DAILY: "1"
        run: python scrapers/taiwan/wra/taiwan_wra_scraper.py

      - name: Commit & push new data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/taiwan/wra
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data(taiwan/wra): scheduled scrape ${ts}"
          git pull --rebase origin main
          git push
