name: Taiwan WRA scrape

# WRA daily operations are generally entered by 09:30 Taiwan time.
# Run at 01:45 + 13:45 UTC (09:45 + 21:45 Taiwan) and always re-fetch
# yesterday + today to catch a missed run.
on:
  schedule:
    - cron: "45 1,13 * * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backfill start (YYYY-MM-DD). Leave blank for default (yesterday+today)."
        required: false
      end_date:
        description: "Backfill end (YYYY-MM-DD)."
        required: false

permissions:
  contents: write

concurrency:
  group: taiwan-wra
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          OUTPUT_DIR: ${{ github.workspace }}/data/taiwan/wra
          TAIWAN_START_DATE: ${{ inputs.start_date }}
          TAIWAN_END_DATE: ${{ inputs.end_date }}
        run: python scrapers/taiwan/wra/taiwan_wra_scraper.py

      - name: Commit & push new data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/taiwan/wra
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data(taiwan/wra): scheduled scrape ${ts}"
          git pull --rebase origin main
          git push
