name: China MWR API scrape

# The MWR page is a current realtime table, but its report time is normally
# 08:00 Beijing. Run at 12:30 and again at 20:30 Beijing time so the
# current-only table has a same-day fallback capture. The scraper is API-first
# and uses historical OCR CSVs only to decode the site's custom-font obfuscation.
on:
  schedule:
    - cron: "30 4,12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: china-mwr-api
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TZ: Asia/Shanghai
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "China MWR scrape attempt ${attempt}/3"
            if python scrapers/china/mwr_api/china_mwr_api_scraper.py; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              echo "China MWR scrape failed after 3 attempts."
              exit 1
            fi
            echo "Scrape failed; waiting 5 minutes before retry."
            sleep 300
          done

      - name: Commit & push new data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/china/mwr_api
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data(china/mwr_api): scheduled scrape ${ts}"
          for attempt in 1 2; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            if [ "$attempt" = "2" ]; then
              echo "Commit push failed after 2 attempts."
              exit 1
            fi
            echo "Push failed; retrying after 30 seconds."
            sleep 30
          done
