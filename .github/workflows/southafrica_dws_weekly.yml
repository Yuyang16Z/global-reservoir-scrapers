name: South Africa DWS weekly scrape

on:
  schedule:
    # Tuesday 06:00 UTC — DWS publishes the new Monday bulletin during the
    # preceding day in South Africa (UTC+2). Tuesday gives them a comfortable
    # publish window without polling at the wrong time.
    - cron: "0 6 * * 2"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional report Monday (YYYY-MM-DD). Leave blank for latest."
        required: false

permissions:
  contents: write

concurrency:
  group: southafrica-dws-weekly
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          OUTPUT_DIR: ${{ github.workspace }}/data/southafrica/dws_weekly
          DWS_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          for attempt in 1 2 3; do
            echo "South Africa DWS scrape attempt ${attempt}/3"
            if python scrapers/southafrica/dws_weekly/dws_weekly_scraper.py; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              echo "South Africa DWS scrape failed after 3 attempts."
              exit 1
            fi
            echo "Scrape failed; retrying after 60 seconds."
            sleep 60
          done

      - name: Commit & push new data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/southafrica/dws_weekly
          git add scrapers/southafrica/dws_weekly
          git add requirements.txt .github/workflows/southafrica_dws_weekly.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data(southafrica/dws-weekly): scheduled scrape ${ts}"
          for attempt in 1 2; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            if [ "$attempt" = "2" ]; then
              echo "Commit push failed after 2 attempts."
              exit 1
            fi
            echo "Push failed; retrying after 30 seconds."
            sleep 30
          done
