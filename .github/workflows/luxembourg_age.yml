name: Luxembourg AGE reservoir level

on:
  schedule:
    # 05:17/17:17 Luxembourg winter time; 06:17/18:17 summer time.
    # The source exposes about five rolling days, so two daily runs provide recovery margin.
    - cron: "17 4,16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: luxembourg-age
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run scraper
        env:
          OUTPUT_DIR: ${{ github.workspace }}/data/luxembourg/age
        run: python scrapers/luxembourg/age/luxembourg_age_scraper.py --max-lag-days 3

      - name: Commit and push new data
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/luxembourg/age
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data(luxembourg/age): scheduled scrape ${ts}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
